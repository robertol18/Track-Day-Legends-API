# Default values for track-day-legends.

replicaCount: 2

image:
  repository: ghcr.io/robertol18/track-day-legends-api
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

containerPort: 8080

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

podAnnotations: {}
podLabels: {}

# Harden pod defaults. Service account token is disabled by default for this API.
automountServiceAccountToken: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Non-sensitive environment variables managed via ConfigMap.
env:
  SPRING_PROFILES_ACTIVE: "default"
  JAVA_TOOL_OPTIONS: "-XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0"

# Secrets should come from a pre-created secret (preferred) or be injected at deploy time.
secret:
  create: false
  existingSecret: ""
  annotations: {}
  stringData: {}

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    path: /actuator/health/liveness
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 30

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: track-day-legends.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
