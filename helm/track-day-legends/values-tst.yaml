replicaCount: 3

image:
  tag: "1.0.0"
  pullPolicy: IfNotPresent

env:
  SPRING_PROFILES_ACTIVE: "tst"
  JAVA_TOOL_OPTIONS: "-XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: toshiba
      paths:
        - path: /
          pathType: Prefix
  tls: []

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Reference an existing secret managed outside Git (External Secrets, Sealed Secrets, etc.).
secret:
  create: false
  existingSecret: track-day-legends-api-secrets
